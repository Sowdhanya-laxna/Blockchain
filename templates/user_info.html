<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Info | Blockchain Forensics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00fff7;
            --primary-dark: #006d77;
            --secondary: #7b2cbf;
            --dark: #0d1b2a;
            --darker: #070f16;
            --light: #e0e1dd;
            --card-bg: rgba(13, 27, 42, 0.8);
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--light);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        /* Navbar styling */
        .navbar {
            background: rgba(13, 27, 42, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 247, 0.2);
            padding: 0.8rem 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }
        
        .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--primary) !important;
            text-shadow: 0 0 10px rgba(0, 255, 247, 0.5);
            letter-spacing: 1px;
        }
        
        .nav-link {
            color: rgba(224, 225, 221, 0.8) !important;
            font-weight: 500;
            margin: 0 0.5rem;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--primary) !important;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after, .nav-link.active::after {
            width: 100%;
        }
        
        .wallet-display {
            background: rgba(0, 255, 247, 0.1);
            border: 1px solid rgba(0, 255, 247, 0.2);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            color: var(--primary);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            margin-right: 1rem;
        }
        
        .btn-logout {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 20px;
            padding: 0.5rem 1.5rem;
            transition: all 0.3s ease;
        }
        
        .btn-logout:hover {
            background: var(--primary);
            color: var(--dark);
            box-shadow: 0 0 15px rgba(0, 255, 247, 0.5);
        }
        
        /* Content styling */
        .container {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid rgba(0, 255, 247, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        
        h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 247, 0.3);
            margin-bottom: 1.5rem;
        }
        
        .list-group-item {
            background-color: rgba(13, 27, 42, 0.5);
            color: var(--light);
            border: 1px solid rgba(0, 255, 247, 0.2);
            margin-bottom: 0.5rem;
            border-radius: 8px !important;
        }
        
        .list-group-item strong {
            color: var(--primary);
        }
        
        .btn-secondary {
            background: rgba(0, 255, 247, 0.1);
            border: 1px solid rgba(0, 255, 247, 0.2);
            color: var(--light);
        }
        
        .btn-secondary:hover {
            background: rgba(0, 255, 247, 0.2);
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-danger {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
        }
        
        .btn-danger:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff6b6b;
            color: #fff;
        }
        
        /* Responsive design */
        @media (max-width: 992px) {
            .navbar-collapse {
                background: rgba(13, 27, 42, 0.95);
                padding: 1rem;
                border-radius: 0 0 12px 12px;
                border: 1px solid rgba(0, 255, 247, 0.2);
                border-top: none;
            }
        }
        
        @media (max-width: 576px) {
            .wallet-display {
                font-size: 0.7rem;
                padding: 0.3rem 0.8rem;
            }
            
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-wallet me-2"></i>BLOCKCHAIN FORENSICS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('summary') }}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('transactions') }}">Transactions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('social') }}">Social Presence</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{{ url_for('user') }}">User Info</a>
                    </li>
                </ul>
                <span class="wallet-display me-3">
                    <i class="fas fa-wallet me-1"></i> {{ session.wallet_id[:8] }}...{{ session.wallet_id[-8:] }}
                </span>
                <a href="{{ url_for('logout') }}" class="btn btn-logout">
                    <i class="fas fa-sign-out-alt me-1"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container mt-4">
        <h2><i class="fas fa-user me-2"></i>User Info</h2>
        <ul class="list-group mt-2">
            {% for key, value in user_info.items() %}
            <li class="list-group-item"><strong>{{ key.replace('_',' ').capitalize() }}:</strong> {{ value }}</li>
            {% endfor %}
        </ul>
        <div class="mt-3">
            <a href="{{ url_for('summary') }}" class="btn btn-secondary">Back</a>
            <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
